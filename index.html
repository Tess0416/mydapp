<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc 官方 USDC 托管交互</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #121212; color: #fff; padding: 20px; }
    .card { background: #1e1e1e; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .card h3 { margin-bottom: 12px; color: #ffcc00; }
    .btn { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 8px; color: #fff; margin-bottom: 10px; cursor: pointer; }
    .btn-blue { background: #0071e3; }
    .btn-green { background: #22c55e; }
    .btn-orange { background: #f97316; }
    .info { background: #2a2a2a; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 14px; word-break: break-all; }
    .tip { color: #ccc; font-size: 12px; margin-top: 4px; }
    input {
      width: 100%; padding: 12px; font-size: 16px; border-radius: 8px;
      border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <h3>🔌 连接钱包</h3>
  <button class="btn btn-blue" id="connectBtn">连接钱包</button>
  <div class="info" id="account" style="display:none"></div>
  <div class="tip" id="tip"></div>
</div>

<div class="card">
  <h3>💰 授权 USDC → FxEscrow（官方托管）</h3>
  <input type="number" placeholder="输入 USDC 金额" id="amountInput">
  <button class="btn btn-blue" id="approveBtn">授权 USDC</button>
</div>

<div class="card">
  <h3>📥 托管到官方 FxEscrow</h3>
  <button class="btn btn-green" id="depositBtn">执行托管</button>
</div>

<div class="card">
  <h3>⚖️ 放款/赎回</h3>
  <button class="btn btn-orange" id="releaseBtn">释放资金</button>
</div>

<script>
let currentAccount = null;
const provider = window.okxwallet || window.ethereum;

// ======================
// 官方 Arc 测试网合约地址（来自你提供的文档）
// ======================
const USDC = "0x3600000000000000000000000000000000000000";
const FxEscrow = "0x867650F5eAe8df91445971f14d89fd84F0C9a9f8";
const Permit2 = "0x000000000022D473030F116dDEE9F6B43aC78BA3";

function tip(text) {
  document.getElementById("tip").innerText = text;
}

function toHex64(value) {
  return BigInt(value).toString(16).padStart(64, "0");
}

function addressToHex(addr) {
  return addr.slice(2).padStart(64, "0");
}

// 连接钱包
document.getElementById("connectBtn").onclick = async () => {
  if (!provider) return tip("未检测到钱包");
  try {
    const accounts = await provider.request({ method: "eth_requestAccounts" });
    currentAccount = accounts[0];
    const accEl = document.getElementById("account");
    accEl.innerText = currentAccount;
    accEl.style.display = "block";
    tip("连接成功");
  } catch (e) {
    tip("连接失败");
  }
};

// ------------------------------
// 1. 授权 USDC 给官方 FxEscrow（完全标准 ERC20 approve）
// ------------------------------
document.getElementById("approveBtn").onclick = async () => {
  if (!currentAccount) return tip("请先连接钱包");
  const input = document.getElementById("amountInput").value;
  if (!input || isNaN(input) || Number(input) <= 0) return tip("输入有效金额");

  const amount = BigInt(input) * 10n ** 6n; // 官方 USDC 6 位小数

  try {
    await provider.request({
      method: "eth_sendTransaction",
      params: [{
        from: currentAccount,
        to: USDC,
        data: "0x095ea7b3" + addressToHex(FxEscrow) + toHex64(amount)
      }]
    });
    tip("授权成功");
  } catch (e) {
    tip("授权已取消");
  }
};

// ------------------------------
// 2. 托管 deposit（官方 escrow 标准）
// ------------------------------
document.getElementById("depositBtn").onclick = async () => {
  if (!currentAccount) return tip("请先连接钱包");
  const input = document.getElementById("amountInput").value;
  if (!input) return tip("输入金额");

  const amount = BigInt(input) * 10n ** 6n;

  try {
    await provider.request({
      method: "eth_sendTransaction",
      params: [{
        from: currentAccount,
        to: FxEscrow,
        data: "0xd945d9f8" + toHex64(amount) // deposit(uint256)
      }]
    });
    tip("托管成功");
  } catch (e) {
    tip("托管失败：合约 revert");
  }
};

// ------------------------------
// 3. 释放/赎回（官方 withdraw）
// ------------------------------
document.getElementById("releaseBtn").onclick = async () => {
  if (!currentAccount) return tip("请先连接钱包");
  try {
    await provider.request({
      method: "eth_sendTransaction",
      params: [{
        from: currentAccount,
        to: FxEscrow,
        data: "0x2e1a7d4d" // withdraw()
      }]
    });
    tip("释放成功");
  } catch (e) {
    tip("释放失败");
  }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>去中心化托管仲裁 DApp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background-color: #121212;
      color: #fff;
      padding: 20px;
    }
    .card {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h3 {
      margin-bottom: 12px;
      color: #ffcc00;
    }
    .btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      color: #fff;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .btn-blue { background: #0071e3; }
    .btn-green { background: #22c55e; }
    .btn-orange { background: #f97316; }
    .address {
      background: #2a2a2a;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 14px;
      word-break: break-all;
      display: none; /* 默认不显示 */
    }
  </style>
</head>
<body>

<div class="card">
  <h3>🔌 连接钱包</h3>
  <button class="btn btn-blue" id="connectBtn">连接钱包（OKX / MetaMask）</button>
  <div class="address" id="account"></div>
</div>

<div class="card">
  <h3>💰 授权并托管 10 USDC</h3>
  <button class="btn btn-blue" id="approveBtn">授权 USDC</button>
  <button class="btn btn-green" id="depositBtn">托管到合约</button>
</div>

<div class="card">
  <h3>⚖️ 仲裁放款</h3>
  <button class="btn btn-orange" id="releaseBtn">放款至当前账户</button>
</div>

<script>
let currentAccount = null;

// 连接钱包（只有点按钮才会触发，绝不自动连接）
document.getElementById("connectBtn").onclick = async () => {
  try {
    const provider = window.okxwallet || window.ethereum;
    if (!provider) {
      alert("请安装 OKX 钱包或 MetaMask");
      return;
    }

    // 主动请求账户 → 一定会弹窗
    const accounts = await provider.request({
      method: "eth_requestAccounts"
    });

    currentAccount = accounts[0];
    
    // 显示地址
    const accountEl = document.getElementById("account");
    accountEl.innerText = "已连接：" + currentAccount;
    accountEl.style.display = "block";

  } catch (err) {
    alert("连接被拒绝或出错：" + err.message);
  }
};

// 授权
document.getElementById("approveBtn").onclick = () => {
  if (!currentAccount) {
    alert("请先连接钱包");
    return;
  }
  alert("请在钱包中确认授权交易");
};

// 托管
document.getElementById("depositBtn").onclick = () => {
  if (!currentAccount) {
    alert("请先连接钱包");
    return;
  }
  alert("请在钱包中确认托管交易");
};

// 放款
document.getElementById("releaseBtn").onclick = () => {
  if (!currentAccount) {
    alert("请先连接钱包");
    return;
  }
  alert("请在钱包中确认放款交易");
};
</script>
</body>
</html>

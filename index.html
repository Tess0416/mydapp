<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC 测试网 USDC 托管 FxEscrow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #121212; color: #fff; padding: 20px; }
    .card { background: #1e1e1e; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .card h3 { margin-bottom: 12px; color: #ffcc00; }
    .btn { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 8px; color: #fff; margin-bottom: 10px; cursor: pointer; }
    .btn-blue { background: #0071e3; }
    .btn-green { background: #22c55e; }
    .btn-orange { background: #f97316; }
    .info { background: #2a2a2a; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 14px; word-break: break-all; }
    .tip { color: #ccc; font-size: 12px; margin-top: 4px; }
    input {
      width: 100%; padding: 12px; font-size: 16px; border-radius: 8px;
      border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <h3>🔌 连接钱包（必须切 ARC 测试网）</h3>
  <button class="btn btn-blue" id="connectBtn">连接钱包</button>
  <div class="info" id="account" style="display:none"></div>
  <div class="tip" id="tip"></div>
</div>

<div class="card">
  <h3>💰 授权 USDC 给 FxEscrow</h3>
  <input type="number" placeholder="输入 USDC 金额" id="amountInput">
  <button class="btn btn-blue" id="approveBtn">授权 USDC</button>
</div>

<div class="card">
  <h3>📥 ARC测试网 执行托管</h3>
  <button class="btn btn-green" id="depositBtn">执行托管</button>
</div>

<div class="card">
  <h3>⚖️ 赎回释放资金</h3>
  <button class="btn btn-orange" id="releaseBtn">赎回资金</button>
</div>

<script>
let currentAccount = null;
const provider = window.okxwallet || window.ethereum;

// ========== ARC 测试网 合约地址 ==========
const USDC_ADDR = "0x3600000000000000000000000000000000000000";
const ESCROW_ADDR = "0x867650F5eAe8df91445971f14d89fd84F0C9a9f8";

function tip(text) {
  document.getElementById("tip").innerText = text;
}

// 地址转标准64位hex
function padAddr(addr) {
  return addr.toLowerCase().replace("0x","").padStart(64,"0");
}
// 数值转64位hex
function padNum(n) {
  return BigInt(n).toString(16).padStart(64,"0");
}

// 连接钱包
document.getElementById("connectBtn").onclick = async () => {
  if(!provider) return tip("未检测到钱包插件");
  try {
    const accounts = await provider.request({method:"eth_requestAccounts"});
    currentAccount = accounts[0];
    document.getElementById("account").innerText = currentAccount;
    document.getElementById("account").style.display = "block";
    tip("钱包连接成功，请确认在 ARC 测试网");
  } catch(e) {
    tip("连接钱包失败");
  }
};

// 授权 USDC
document.getElementById("approveBtn").onclick = async () => {
  if(!currentAccount) return tip("先连接钱包");
  const val = document.getElementById("amountInput").value.trim();
  if(!val || Number(val) <= 0) return tip("输入正确金额");

   const amountBig = BigInt(val) * 1000000n;
  const data = "0x095ea7b3" + padAddr(ESCROW_ADDR) + padNum(amountBig);

  try {
    await provider.request({
      method:"eth_sendTransaction",
      params:[{
        from: currentAccount,
        to: USDC_ADDR,
        data: data
      }]
    });
    tip("授权已发起，钱包确认后等待上链");
  } catch(e) {
    tip("授权取消或失败");
  }
};

// ARC 测试网 托管Deposit 修复版
document.getElementById("depositBtn").onclick = async () => {
  if(!currentAccount) return tip("先连接钱包");
  const val = document.getElementById("amountInput").value.trim();
  if(!val) return tip("请输入托管金额");

   const amountBig = BigInt(val) * 1000000n;
  // 适配ARC测试网：deposit 完整参数结构
  const selector = "0xd945d9f8";
  // 按ARC合约要求：金额 + 额外占位参数补齐
  const data = "0x" + selector.slice(2) + padNum(amountBig) + padAddr(currentAccount);

  try {
    await provider.request({
      method:"eth_sendTransaction",
      params:[{
        from: currentAccount,
        to: ESCROW_ADDR,
        data: data
      }]
    });
    tip("托管交易已发起，钱包确认");
  } catch(e) {
    tip("托管失败：未授权/不在ARC测试网/地址无白名单");
  }
};

// 赎回
document.getElementById("releaseBtn").onclick = async () => {
  if(!currentAccount) return tip("先连接钱包");
  try {
    const data = "0x2e1a7d4d";
    await provider.request({
      method:"eth_sendTransaction",
      params:[{
        from: currentAccount,
        to: ESCROW_ADDR,
        data: data
      }]
    });
    tip("赎回交易已发起");
  } catch(e) {
    tip("赎回失败");
  }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>去中心化托管仲裁 DApp</title>
  <script src="https://cdn.ethers.org/lib-ethers/6.13.0/umd/ethers.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 2rem;
      color: #7dd3fc;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
    }
    .btn {
      width: 100%;
      padding: 0.9rem;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin: 0.4rem 0;
      background: #0284c7;
      color: white;
    }
    .btn:hover {
      background: #0369a1;
    }
    .info {
      margin: 0.6rem 0;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>⚖️ 去中心化托管 DApp</h1>
    </div>

    <div class="card">
      <h3>👛 钱包连接</h3>
      <button class="btn" id="connectBtn">连接钱包（MetaMask/OKX）</button>
      <div class="info" id="account"></div>
      <div class="info" id="walletType"></div>
    </div>
  </div>

  <script>
    let provider, signer, userAddress;

    document.getElementById("connectBtn").onclick = async () => {
      alert("点击连接，正在检测钱包…");
      try {
        let ethereumProvider = null;

        // 优先检测 OKX 钱包插件
        if (window.okxwallet) {
          ethereumProvider = window.okxwallet;
          document.getElementById("walletType").innerText = "钱包类型：OKX Wallet";
        }
        // 再检测 MetaMask / OKX 手机浏览器
        else if (window.ethereum) {
          ethereumProvider = window.ethereum;
          // 判断是不是 OKX
          if (window.ethereum.isOkxWallet) {
            document.getElementById("walletType").innerText = "钱包类型：OKX Wallet (App)";
          } else {
            document.getElementById("walletType").innerText = "钱包类型：MetaMask";
          }
        } else {
          alert("未检测到 MetaMask 或 OKX 钱包，请先安装！");
          return;
        }

        // 请求连接账户
        const accounts = await ethereumProvider.request({
          method: "eth_requestAccounts"
        });

        // 用 ethers 连接
        provider = new ethers.BrowserProvider(ethereumProvider);
        signer = await provider.getSigner();
        userAddress = accounts[0];

        // 显示结果
        document.getElementById("account").innerText = "✅ 已连接：" + userAddress;
        alert("连接成功！\n地址：" + userAddress);

      } catch (err) {
        alert("连接失败：" + err.message);
        console.error(err);
      }
    };
  </script>
</body>
</html>
